name: Nightly Tag

# Tags a new nightly release on every push to main that touches non-doc
# files. The pushed tag (nightly-{YYYYMMDD}-{short_sha}) triggers
# release.yml, which builds the DMG, publishes it as a prerelease, skips
# the stable Sparkle appcast, and prunes older nightly releases so only
# the most recent nightly stays on the releases page.

on:
  push:
    branches: [main]
    # Skip pushes that only touch documentation, license text, the
    # appcast itself (would loop), CI dotfiles, and editor metadata.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize nightly-tagging runs so two rapid pushes don't race the
# tag/cleanup logic. Newer runs cancel older ones — we only ever care
# about tagging the latest commit.
concurrency:
  group: nightly-tag
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with tags
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          ref: main
          # Use a PAT so the tag push triggers release.yml. Tags pushed by
          # the default GITHUB_TOKEN are silently suppressed by GitHub's
          # workflow-loop guard, which would leave the tag orphaned.
          # Falls back to GITHUB_TOKEN if the secret isn't configured yet
          # (workflow still tags the commit, just won't auto-trigger
          # release.yml until the PAT is added).
          token: ${{ secrets.RELEASE_TAG_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compute nightly tag
        id: tag
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          TAG="nightly-${DATE}-${SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Nightly tag: $TAG"

      - name: Configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push nightly tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag -a "$TAG" -m "Nightly build $TAG"
          git push origin "$TAG"
          echo "Pushed $TAG — release.yml will build, publish, and prune older nightlies."
